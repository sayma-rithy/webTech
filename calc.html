<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ab93d3;
    margin:0;
}

.calcBox{
    background:#140101;
    padding:20px;
    border-radius:12px;
    display:grid;
    gap:10px;
}

.screen{
    grid-column:span 4;
    height:50px;
    font-size:25px;
    text-align:right;
    padding:10px;
    border:none;
}

.btn{
    height:60px;
    font-size:18px;
    border:none;
    cursor:pointer;
}

.op{ background:rgb(14, 142, 233); }
.eq{ background:rgb(187, 202, 187); color:white; }
.cl{ background:rgb(160, 227, 16); color:white; }
</style>

</head>

<body>

<div class="calcBox">
    <input type="text" id="display" class="screen" readonly>

    <button class="cl">C</button>
    <button class="op">/</button>
    <button class="op">*</button>
    <button class="op">-</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="op">+</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="eq">=</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>0</button>
</div>

<script>
const display = document.getElementById("display");
const allButtons = document.querySelectorAll("button");

for(let i = 0; i < allButtons.length; i++){
    allButtons[i].addEventListener("click", function(){
        const val = this.innerHTML;

        if(val === "C"){
            display.value = "";
        }
        else if(val === "="){
            try{
                display.value = eval(display.value);
            }
            catch{
                display.value = "Error";
            }
        }
        else{
            display.value += val;
        }
    });
}
</script>

</body>
</html>
